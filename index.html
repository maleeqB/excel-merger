<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel Merger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 520px;
      width: 100%;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #1a1a1a;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
      color: #888;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #4f46e5;
      background: #f5f3ff;
      color: #4f46e5;
    }
    .drop-zone p { font-size: 15px; }
    .file-list {
      margin-bottom: 20px;
      font-size: 14px;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f9fafb;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .file-item .name { color: #333; }
    .file-item .remove {
      color: #ef4444;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 18px;
      line-height: 1;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #1420FF;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #0010e0; }
    .btn:disabled { background: #8a91ff; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    .status.success { display: block; background: #ffffff; color: #1f2937; border-left: 4px solid #1420FF; box-shadow: 0 1px 2px rgba(0,0,0,0.05); padding: 12px; }
    .status.error { display: block; background: #fff5f5; color: #b91c1c; border-left: 4px solid #ef4444; padding: 12px; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Excel Merger</h1>
    <p class="subtitle">
      Upload 2 or more Excel files to merge. Duplicate usernames are resolved
      by keeping the entry with a non-zero Total.
    </p>

    <div class="drop-zone" id="dropZone">
      <p>Drop Excel files here or click to browse</p>
      <input type="file" id="fileInput" multiple accept=".xlsx,.xls" hidden>
    </div>

    <div class="file-list" id="fileList"></div>

    <button class="btn" id="mergeBtn" disabled>Merge & Download</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const mergeBtn = document.getElementById('mergeBtn');
    const status = document.getElementById('status');
    let files = [];

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

    function addFiles(newFiles) {
      for (const f of newFiles) {
        if (!files.some(x => x.name === f.name && x.size === f.size)) {
          files.push(f);
        }
      }
      render();
    }

    function removeFile(idx) {
      files.splice(idx, 1);
      render();
    }

    function render() {
      fileList.innerHTML = files.map((f, i) => `
        <div class="file-item">
          <span class="name">${f.name}</span>
          <button class="remove" onclick="removeFile(${i})">&times;</button>
        </div>
      `).join('');
      mergeBtn.disabled = files.length < 2;
    }

    mergeBtn.addEventListener('click', async () => {
      status.className = 'status';
      status.style.display = '';
      mergeBtn.disabled = true;
      mergeBtn.innerHTML = '<span class="spinner"></span>Merging...';

      const formData = new FormData();
      files.forEach(f => formData.append('files', f));

      try {
        const res = await fetch('/merge', { method: 'POST', body: formData });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Merge failed');
        }

        const stats = JSON.parse(res.headers.get('X-Stats') || '{}');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'merged.xlsx';
        a.click();
        URL.revokeObjectURL(url);

        let html = `<strong>Done!</strong> ${stats.totalInput} rows merged into ${stats.totalOutput} (${stats.duplicatesRemoved} duplicates removed).`;
        if (stats.flagged && stats.flagged.length > 0) {
          html += `<div style="margin-top:10px;padding:10px;background:#f0f4ff;border:1px solid #1420FF;border-radius:6px;color:#1a1a1a;">
            <strong> ${stats.flagged.length} username(s) had multiple non-zero score entries:</strong>
            <ul style="margin-top:6px;padding-left:18px;">
              ${stats.flagged.map(u => `<li><code>${u}</code></li>`).join('')}
            </ul>
          </div>`;
        }
        status.className = 'status success';
        status.innerHTML = html;
      } catch (err) {
        status.className = 'status error';
        status.textContent = err.message;
      } finally {
        mergeBtn.disabled = files.length < 2;
        mergeBtn.textContent = 'Merge & Download';
      }
    });
  </script>
</body>
</html>
